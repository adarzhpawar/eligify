<style>
        body { background-color: #FAFAF2; }
        .input-border { border: 1px solid rgba(34, 34, 34, 0.1); }
        .input-border:focus-within { border: 2px solid #222222; }
        
        /* Custom Range Slider Styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #222222;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e4e2e2;
            border-radius: 2px;
        }

        /* Loading Overlay Animation */
        .loading-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .ai-core {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
    </style>

<body class="min-h-screen font-body-md text-on-surface antialiased flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Top AppBar (Brand Anchor) -->

<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] mt-stack-lg relative z-10"><!-- Header Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-ambient-1 p-8 mb-6 flex flex-col items-center text-center">
<div class="flex items-center justify-between w-full mb-6">
<div class="flex flex-col items-start">
<h1 class="font-headline-md text-headline-md text-primary">Professional Details</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Finalizing your civic profile to match you with relevant schemes.</p>
</div>
<div class="flex flex-col items-center">
<span class="text-label-sm text-on-surface-variant uppercase mb-2">Identity</span>
<div class="flex items-center space-x-2">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-label-sm">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<div class="w-8 h-[1px] bg-outline-variant"></div>
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-label-sm">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<div class="w-8 h-[1px] bg-outline-variant"></div>
<div class="w-8 h-8 rounded-full bg-soft-yellow text-primary-container border-2 border-primary-container flex items-center justify-center font-label-sm font-bold">3</div>
</div>
</div>
</div>
</div>
<form class="flex flex-col gap-6" id="onboarding-form" onsubmit="event.preventDefault(); triggerLoading();">
<!-- Occupation Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-ambient-1 p-8">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-primary" for="occupation">Current Occupation</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none group-focus-within:text-primary transition-colors">work</span>
<select class="w-full bg-surface-container-lowest h-[56px] rounded-input input-border pl-12 pr-4 font-body-md text-body-md text-primary appearance-none focus:outline-none focus:ring-0 transition-all cursor-pointer" id="occupation">
<option disabled="" selected="" value="">Select an industry...</option>
<option value="tech">Technology &amp; Software</option>
<option value="healthcare">Healthcare &amp; Medical</option>
<option value="education">Education &amp; Research</option>
<option value="finance">Finance &amp; Accounting</option>
<option value="government">Public Sector &amp; Government</option>
<option value="other">Other / Independent</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Employment Status Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-ambient-1 p-8">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-primary">Employment Status</label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="status" type="radio">
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">Full-Time</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="status" type="radio">
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">Part-Time</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="status" type="radio">
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">Self-Employed</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="status" type="radio">
<div class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">Unemployed</div>
</label>
</div>
</div>
</div>
<!-- Salary Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-ambient-1 p-8">
<div class="flex flex-col gap-4">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-primary" for="salary">Annual Salary Range</label>
<span class="font-headline-md text-headline-md text-primary font-bold" id="salary-value">$75,000</span>
</div>
<div class="relative w-full mt-2">
<input class="w-full appearance-none bg-transparent focus:outline-none" id="salary" max="250000" min="0" oninput="document.getElementById('salary-value').innerText = '$' + Number(this.value).toLocaleString()" step="5000" type="range" value="75000">
<div class="absolute top-1/2 left-0 h-[4px] -translate-y-1/2 bg-primary-container rounded-l-sm pointer-events-none" id="salary-progress" style="width: 30%;"></div>
</div>

<span>$0</span>
<span>$250k+</span>
</div>
</div>
</div>

<div class="bg-surface-container-lowest rounded-xl shadow-ambient-1 p-6 flex justify-between items-center">
<button class="font-label-md text-on-surface-variant hover:text-primary px-4 py-2 transition-colors flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]">arrow_back</span> Cancel
        </button>
<button class="h-[56px] px-8 rounded-lg bg-primary-container text-on-primary font-label-md hover:bg-[#333333] hover:shadow-ambient-2 transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">

<!-- AI Processing Loading Overlay (Level 2 Elevation Context) -->
<div class="loading-overlay fixed inset-0 z-50 flex items-center justify-center bg-warm-cream/90 backdrop-blur-sm" id="loading-overlay">
<div class="bg-surface-container-lowest rounded-2xl shadow-ambient-2 p-8 md:p-12 max-w-md w-full mx-4 flex flex-col items-center text-center">
<!-- AI Core Animation Placeholder / Graphic -->
<div class="w-24 h-24 mb-8 relative flex items-center justify-center">
<div class="absolute inset-0 bg-soft-yellow/50 rounded-full blur-xl ai-core"></div>
<div class="w-16 h-16 bg-primary-container rounded-xl rotate-45 flex items-center justify-center shadow-lg relative z-10 ai-core" style="animation-delay: 200ms;">
<span class="material-symbols-outlined text-on-primary -rotate-45 text-3xl" style="font-variation-settings: &quot;FILL&quot; 1;">auto_awesome</span>
</div>
</div>
<h2 class="font-headline-lg text-headline-lg text-primary mb-2">Analyzing Profile</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">Eligify AI is currently matching your credentials against active government eligibility databases.</p>
<!-- Linear Progress -->
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full w-0 transition-all duration-300 ease-out" id="loading-bar"></div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-3 uppercase tracking-widest" id="loading-text">Validating Data...</p>
</div>
</div>
<!-- Script for interactivity -->
<script>
        // Update range slider fill
        const salaryInput = document.getElementById('salary');
        const salaryProgress = document.getElementById('salary-progress');
        
        function updateSlider() {
            const val = (salaryInput.value - salaryInput.min) / (salaryInput.max - salaryInput.min) * 100;
            salaryProgress.style.width = val + '%';
        }
        salaryInput.addEventListener('input', updateSlider);
        updateSlider();

        // Simulate Loading State
        function triggerLoading() {
            const overlay = document.getElementById('loading-overlay');
            const bar = document.getElementById('loading-bar');
            const text = document.getElementById('loading-text');
            
            overlay.classList.add('active');
            
            // Fake progress steps
            setTimeout(() => { bar.style.width = '30%'; text.innerText = 'Checking Local Schemes...'; }, 500);
            setTimeout(() => { bar.style.width = '65%'; text.innerText = 'Cross-referencing Federal APIs...'; }, 1500);
            setTimeout(() => { bar.style.width = '90%'; text.innerText = 'Finalizing Profile...'; }, 2800);
            setTimeout(() => { bar.style.width = '100%'; text.innerText = 'Complete!'; }, 3500);
            
            // Normally this would redirect, for demo we just reset
            setTimeout(() => { 
                overlay.classList.remove('active'); 
                setTimeout(() => { bar.style.width = '0%'; text.innerText = 'Validating Data...'; }, 300);
            }, 4000);
        }
    </script>
