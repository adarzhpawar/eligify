<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Smooth transitions for inputs */
        .premium-input {
            transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center p-4 sm:p-margin-mobile md:p-margin-desktop antialiased">
<!-- Minimalist Brand Header -->
<header class="mb-stack-lg w-full max-w-4xl text-center flex flex-col items-center justify-center relative z-10"><div class="flex items-center justify-center">
<img alt="Eligify" class="w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjSwzjdQpQiUC_co-16tWAMzNYk4qF7LEOsLflM1bFseXMC3vRprFpgcjNV0IGlSvWPryyxH574Q1rwrhaKQsYU7xu-cdLunDTPzeKtgfA9OaIAv_Rryc_UnroDRd-C9L8rJ4js5EosXb7KyC4yCZGIA5FEwd8kDthOZa5l5UsThN5h_319vM4H0J_x--zYfYEMY-Xar1FaLiXfIezvcfHPWj4-U4UeaQbjFKCZzaK4IdlACmDDQuOjcY5011sQMuYhnQL7NvxJSc0" style="width: 120px; height: auto;">
</div></header>
<!-- Main Content Container -->
<main class="w-full max-w-4xl relative z-10">
<form action="#" class="grid grid-cols-1 md:grid-cols-4 gap-6" method="POST">
<!-- Tile 1: Header and Progress -->
<div class="col-span-1 md:col-span-4 bg-surface-container-lowest rounded-[24px] shadow-[0px_10px_30px_rgba(34,34,34,0.05)] border border-outline-variant/10 p-8 sm:p-12 flex flex-col md:flex-row justify-between md:items-center gap-8">
<div class="md:w-1/2">
<h2 class="font-headline-lg text-headline-lg font-bold text-primary mb-2">Establish Identity</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please provide your basic information to begin the verification process.</p>
</div>
<div class="md:w-1/2 relative">
<div class="flex items-center justify-between relative z-10 pt-6">
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-secondary-fixed border-2 border-primary flex items-center justify-center font-label-md text-primary shadow-sm relative z-10">
                                1
                            </div>
<span class="font-label-sm text-label-sm text-primary absolute -top-2 whitespace-nowrap">Identity</span>
</div>
<!-- Connector -->
<div class="flex-1 h-[2px] bg-surface-variant mx-2 relative z-0"></div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-lowest border-2 border-surface-variant flex items-center justify-center font-label-md text-on-surface-variant relative z-10">
                                2
                            </div>
</div>
<!-- Connector -->
<div class="flex-1 h-[2px] bg-surface-variant mx-2 relative z-0"></div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-lowest border-2 border-surface-variant flex items-center justify-center font-label-md text-on-surface-variant relative z-10">
                                3
                            </div>
</div>
</div>
</div>
</div>
<!-- Tile 2: Name Field -->
<div class="col-span-1 md:col-span-4 bg-surface-container-lowest rounded-[24px] shadow-[0px_10px_30px_rgba(34,34,34,0.05)] border border-outline-variant/10 p-8 sm:p-10 flex flex-col justify-center">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="fullName">Full Legal Name</label>
<div class="relative">
<input class="premium-input w-full h-[56px] px-4 bg-surface-container-lowest border border-outline-variant/30 rounded-[12px] font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:border-transparent" id="fullName" name="fullName" placeholder="e.g., Jane Doe" type="text">
</div>
</div>
<!-- Tile 3: Age Field -->
<div class="col-span-1 md:col-span-1 bg-surface-container-lowest rounded-[24px] shadow-[0px_10px_30px_rgba(34,34,34,0.05)] border border-outline-variant/10 p-8 sm:p-10 flex flex-col justify-center">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="age">Age</label>
<input class="premium-input w-full h-[56px] px-4 bg-surface-container-lowest border border-outline-variant/30 rounded-[12px] font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:border-transparent" id="age" max="120" min="18" name="age" placeholder="YY" type="number">
</div>
<!-- Tile 4: State Field -->
<div class="col-span-1 md:col-span-3 bg-surface-container-lowest rounded-[24px] shadow-[0px_10px_30px_rgba(34,34,34,0.05)] border border-outline-variant/10 p-8 sm:p-10 flex flex-col justify-center">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="state">State of Residence</label>
<div class="relative">
<select class="premium-input w-full h-[56px] px-4 pr-12 bg-surface-container-lowest border border-outline-variant/30 rounded-[12px] font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:border-transparent appearance-none bg-white" id="state" name="state">
<option class="text-on-surface-variant/50" disabled="" selected="" value="">Select a jurisdiction...</option>
<option value="AL">Alabama</option>
<option value="AK">Alaska</option>
<option value="AZ">Arizona</option>
<option value="CA">California</option>
<option value="CO">Colorado</option>
<option value="NY">New York</option>
<option value="TX">Texas</option>
<!-- Truncated for brevity, normally a full list -->
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Tile 5: Action Area -->
<div class="col-span-1 md:col-span-4 bg-surface-container-lowest rounded-[24px] shadow-[0px_10px_30px_rgba(34,34,34,0.05)] border border-outline-variant/10 p-6 sm:px-10 sm:py-6 flex items-center justify-between">
<button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors duration-300 px-2 py-2 flex items-center gap-2 group" type="button">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform duration-300">arrow_back</span>
                    Cancel
                </button>
<button class="h-[56px] px-8 bg-primary-container text-on-primary font-label-md text-label-md rounded-[12px] shadow-[0px_4px_14px_rgba(34,34,34,0.1)] hover:shadow-[0px_8px_24px_rgba(34,34,34,0.15)] hover:-translate-y-[2px] transition-all duration-300 cubic-bezier(0.4,0,0.2,1) flex items-center justify-center gap-2 group" type="submit">
                    Next Step
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform duration-300 text-[20px]">arrow_forward</span>
</button>
</div>
</form>
</main>
<!-- Subtle background decoration (optional atmospheric element matching "Assisted Confidence") -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-secondary-fixed/20 blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[50vw] h-[50vw] rounded-full bg-surface-variant/40 blur-[120px]"></div>
</div>
